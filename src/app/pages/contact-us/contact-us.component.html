<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8 shadow p-5 rounded-4 bg-white">
            <h2 class="text-center fw-bold mb-4">Get In Touch</h2>
            <div class="row">
                <div class="col-md-6">
                    <div class="mb-3">
                        <label class="form-label">Full Name</label>
                        <input type="text" class="form-control" placeholder="Abdullah Mohammed">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Email Address</label>
                        <input type="email" class="form-control" placeholder="name@example.com">
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="mb-3">
                        <label class="form-label">Message</label>
                        <textarea class="form-control" rows="4" placeholder="How can we help you?"></textarea>
                    </div>
                </div>
            </div>
            <button class="btn btn-primary w-100 mt-3 rounded-pill py-2">Send Message</button>
        </div>
    </div>
</div>
