<div class="container d-flex align-items-center justify-content-center vh-100">
  <div class="card shadow-lg p-4" style="max-width: 400px; width: 100%; border-radius: 15px;">
    <div class="text-center mb-4">
      <h2 class="fw-bold text-primary">Welcome Back</h2>
      <p class="text-muted">Login to manage your courses</p>
    </div>

    <form>
      <div class="mb-3">
        <label class="form-label">Email address</label>
        <input type="email" class="form-control" placeholder="name@example.com">
      </div>
      <div class="mb-3">
        <label class="form-label">Password</label>
        <input type="password" class="form-control">
      </div>
      <button type="submit" class="btn btn-primary w-100 py-2 rounded-pill shadow-sm">Login</button>
    </form>

    <div class="text-center mt-3">
      <a routerLink="/home" class="text-decoration-none small">Back to Home</a>
    </div>
  </div>
</div>
