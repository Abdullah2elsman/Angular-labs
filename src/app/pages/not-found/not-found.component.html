<div class="container py-5 text-center mt-5">
    <h1 class="display-1 fw-bold text-danger">404</h1>
    <h2 class="mb-4">Oops! Page Not Found</h2>
    <p class="text-muted mb-5">The page you are looking for doesn't exist or has been moved.</p>

    <div class="d-flex justify-content-center gap-3">
        <button (click)="goBack()" class="btn btn-outline-secondary rounded-pill px-5 py-2">
            Go Back
        </button>

        <a routerLink="/home" class="btn btn-primary rounded-pill px-5 py-2">
            Back to Home
        </a>
    </div>
</div>
