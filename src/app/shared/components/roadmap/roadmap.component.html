<div class="roadmap-container p-3">
  <h4 class="fw-bold mb-4 text-primary"><i class="bi bi-signpost-2 me-2"></i>Learning Path</h4>

  <div class="position-relative ps-4 border-start border-2 border-primary ms-2">
    @for (step of roadmap; track step; let i = $index) {
    <div class="mb-4 position-relative">
      <span
        class="position-absolute top-0 start-0 translate-middle bg-primary text-white rounded-circle d-flex align-items-center justify-content-center shadow"
        style="width: 30px; height: 30px; left: -26px !important; font-size: 0.8rem;">
        {{ i + 1 }}
      </span>

      <div class="card border-0 shadow-sm rounded-3 hover-shadow transition">
        <div class="card-body py-3">
          <h6 class="card-title mb-0 fw-bold">{{ step }}</h6>
        </div>
      </div>
    </div>
    }
  </div>
</div>
