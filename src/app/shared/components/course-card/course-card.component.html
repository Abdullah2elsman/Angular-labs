<div class="row">
  @for (course of courses; track course.id) {
  <div class="col-md-4 mb-4">
    <div class="card h-100 shadow-sm">
      <img [src]="course.image" class="card-img-top" [alt]="course.title" />

      <div class="card-body d-flex flex-column">
        <h5 class="card-title text-primary">{{ course.title }}</h5>
        <p class="card-text text-muted mb-1">
          <strong>Instructor:</strong> {{ course.instructor }}
        </p>
        <div class="card-text mb-2">
          <strong>Price:</strong>

          <small class="text-decoration-line-through text-muted ms-2">
            {{ course.price | currency:'EGP' }}
          </small>

          <span class="text-success fw-bold ms-2 fs-5">
            {{ course.price | discount: 20 | currency:'EGP' }}
          </span>

          <span class="badge bg-danger rounded-pill ms-2">
            20% OFF
          </span>
        </div>
        <p class="card-text">
          <span class="badge" [ngClass]="course.seats > 0 ? 'bg-success' : 'bg-danger'">
            {{ course.seats > 0 ? course.seats + ' Seats Left' : 'Full' }}
          </span>
        </p>

        <div class="mt-auto d-flex gap-2">
          <button class="btn btn-primary flex-grow-1 shadow-sm" [disabled]="course.seats === 0"
            (click)="enroll(course.price, 20)" appDisableAfterClick>
            Enroll Now
          </button>
        
          <a [routerLink] = "['/course-details',course.id]" class="btn btn-outline-primary flex-grow-1 shadow-sm" >
            View Course
          </a>
        </div>
      </div>
    </div>
  </div>
  }
</div>
